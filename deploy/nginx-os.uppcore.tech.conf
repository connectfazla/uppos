# Nginx — Uppearance OS (Docker on 127.0.0.1:5858)
#
# Use 127.0.0.1 (not "localhost"): on some hosts "localhost" resolves to ::1 first
# while Docker publishes 5858 on IPv4 only → 502 Bad Gateway.
#
# Install:
#   sudo cp deploy/nginx-os.uppcore.tech.conf /etc/nginx/sites-available/os.uppcore.tech
#   sudo ln -sf /etc/nginx/sites-available/os.uppcore.tech /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d os.uppcore.tech
#
# After Certbot: open the file it edited and confirm the listen 443 ssl { ... } block
# still contains proxy_pass http://127.0.0.1:5858; inside location /

server {
    listen 80;
    listen [::]:80;
    server_name os.uppcore.tech;

    location / {
        proxy_pass http://127.0.0.1:5858;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
