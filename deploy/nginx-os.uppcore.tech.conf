server {
    # Uppearance OS (uppos Docker) → http://127.0.0.1:5858
    # Use 127.0.0.1 not localhost (IPv6 ::1 vs Docker IPv4).
    # After certbot: ensure THIS server_name also has listen 443 ssl with proxy_pass to 5858.
    listen 80;
    listen [::]:80;
    server_name os.uppcore.tech;

    location / {
        proxy_pass http://127.0.0.1:5858;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
