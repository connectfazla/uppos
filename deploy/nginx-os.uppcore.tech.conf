# Nginx site for Uppearance OS on Docker (port 5858).
# Install on the VPS, enable site, obtain TLS with Certbot.
#
#   sudo ln -s /etc/nginx/sites-available/os.uppcore.tech /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d os.uppcore.tech

server {
    listen 80;
    listen [::]:80;
    server_name os.uppcore.tech;

    location / {
        proxy_pass http://127.0.0.1:5858;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
