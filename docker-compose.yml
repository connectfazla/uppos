# Uppearance OS — Docker VPS
# App listens on host port 5858 → container 3000
#
# Database: this app uses the Supabase client (Auth + Postgres + RLS + Storage APIs).
# Use either Supabase Cloud, OR self-hosted Supabase Docker (includes PostgreSQL).
# Optional `postgres` profile below is a standalone Postgres for backups / tooling,
# or wire it yourself — the Next.js container does not set DATABASE_URL by default.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5858:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - uppos

  # Optional: PostgreSQL in Docker (profile `db`). Not connected to the app automatically.
  # Apply migrations with: docker compose --profile db run --rm postgres ... psql
  # For production DB backing Supabase features, prefer https://supabase.com/docs/guides/self-hosting/docker
  postgres:
    profiles:
      - db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uppos}
      # Default only so `docker compose up` works without this var. If you use `--profile db`, set POSTGRES_PASSWORD in .env.production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unused_local_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-uppos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - uppos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uppos} -d ${POSTGRES_DB:-uppos}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  uppos:
    driver: bridge

volumes:
  pgdata:
