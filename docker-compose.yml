# Uppearance OS — Docker VPS
# App listens on host port 5858 → container 3000
#
# Database: Prisma + PostgreSQL (DATABASE_URL in .env.production).
# Optional `postgres` service (profile `db`) — set DATABASE_URL to postgresql://...@postgres:5432/...
# if you run the DB in this compose stack.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5858:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    volumes:
      - contract_uploads:/app/data/contracts
    restart: unless-stopped
    networks:
      - uppos

  # Optional: PostgreSQL in Docker (profile `db`). Not connected to the app automatically.
  # Apply migrations with: docker compose --profile db run --rm postgres ... psql
  # For production, set a strong POSTGRES_PASSWORD when using this profile.
  postgres:
    profiles:
      - db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uppos}
      # Default only so `docker compose up` works without this var. If you use `--profile db`, set POSTGRES_PASSWORD in .env.production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unused_local_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-uppos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - uppos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uppos} -d ${POSTGRES_DB:-uppos}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  uppos:
    driver: bridge

volumes:
  pgdata:
  contract_uploads:
